# zlog 多线程多源文件示例配置
#
# 格式说明（转换字符速查）：
#   %d(fmt)      时间戳，fmt 为 strftime 格式
#   %ms          毫秒
#   %V           日志级别（大写，如 INFO）
#   %c           分类名（category）
#   %t           线程 ID（数字）
#   %F           源文件全路径
#   %f           源文件名（去掉路径）
#   %L           行号
#   %U           函数名
#   %m           日志消息正文
#   %n           换行
#   %M(key)      MDC 上下文值，key 为 zlog_put_mdc() 设置的键名

[global]
strict init = true
buffer min  = 1KB
buffer max  = 2MB

[formats]
# 完整格式：时间戳 | 级别 | 分类 | 线程ID | 源文件:行号 函数() | MDC-request_id | 消息
full   = "%d(%Y-%m-%d %H:%M:%S).%ms [%-5V] [%-8c] [tid:%-5t] [%f:%L %U()] [req:%M(request_id)] %m%n"
# 精简格式：供控制台实时观察
simple = "%d(%H:%M:%S).%ms [%-5V] [%c] %m%n"

[rules]
# 输出规则语法说明：
#   文件输出：  category.LEVEL  "path/to/file";  format
#   控制台输出：category.LEVEL  >stdout;          format
#               category.LEVEL  >stderr;          format
#   注意：文件路径必须用双引号包裹，且不加 > 前缀；stdout/stderr 则需要 > 前缀。

# main 分类：INFO 及以上写文件，所有级别输出到控制台
main.INFO  "./logs/main.log";    full
main.*     >stdout;              simple

# network 分类：DEBUG 及以上写文件，WARN 及以上也输出到 stderr
network.DEBUG  "./logs/network.log";  full
network.WARN   >stderr;               simple

# database 分类
database.DEBUG  "./logs/database.log";  full
database.WARN   >stderr;                simple

# worker 分类
worker.DEBUG  "./logs/worker.log";  full
worker.WARN   >stderr;              simple

# 汇总文件：所有分类的 WARN 及以上写入一个文件，方便排查问题
*.WARN  "./logs/app_warn.log";  full
